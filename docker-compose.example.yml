version: "3.9"

services:
  # PostgreSQL 16 + pgvector
  db:
    image: pgvector/pgvector:pg18
    container_name: rollcall_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: <CAMBIAR_USUARIO>
      POSTGRES_PASSWORD: <CAMBIAR_CONTRASEÑA_SEGURA>
      POSTGRES_DB: rollcall_dev
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U <CAMBIAR_USUARIO> -d rollcall_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
